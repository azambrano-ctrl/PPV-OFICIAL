services:
  # --------------------------------------------------------------------------------
  # BACKEND API (Node.js)
  # --------------------------------------------------------------------------------
  - type: web
    name: ppv-backend
    runtime: node
    region: oregon # O la región más cercana a ti (ej: ohio, frankfurt)
    plan: starter # $7/mes (necesario para persistencia y rendimiento)
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    # Las siguientes variables sensibles debes agregarlas en el Dashboard de Render:
    # - DATABASE_URL
    # - JWT_SECRET
    # - JWT_REFRESH_SECRET
    # - STRIPE_SECRET_KEY
    # - MUX_TOKEN_ID
    # - MUX_TOKEN_SECRET
    # (etc...)

  # --------------------------------------------------------------------------------
  # FRONTEND WEBAPP (Next.js)
  # --------------------------------------------------------------------------------
  - type: web
    name: ppv-webapp
    runtime: node
    region: oregon
    plan: starter # $7/mes (o static gratuito si exportas, pero Next.js suele requerir Node)
    rootDir: webapp
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      # Debes agregar la URL de tu backend una vez desplegado:
      # - NEXT_PUBLIC_API_URL=https://ppv-backend.onrender.com (ejemplo)
