# Nginx RTMP Configuration for PPV Streaming

worker_processes auto;
rtmp_auto_push on;
events {
    worker_connections 1024;
}

# RTMP configuration
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        
        # Live streaming application
        application live {
            live on;
            
            # Record streams
            record all;
            record_path /var/rec;
            record_suffix -%Y-%m-%d-%H_%M_%S.flv;
            record_unique on;
            
            # HLS configuration
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3s;
            hls_playlist_length 60s;
            
            # Multi-bitrate transcoding
            exec ffmpeg -i rtmp://localhost/live/$name
                -c:v libx264 -preset veryfast -tune zerolatency
                -c:a aac -b:a 128k -ar 44100
                -f flv -s 1920x1080 -b:v 5000k -maxrate 5000k -bufsize 10000k rtmp://localhost/hls/$name_1080p
                -f flv -s 1280x720 -b:v 2800k -maxrate 2800k -bufsize 5600k rtmp://localhost/hls/$name_720p
                -f flv -s 854x480 -b:v 1400k -maxrate 1400k -bufsize 2800k rtmp://localhost/hls/$name_480p;
            
            # Authentication
            on_publish http://localhost:5000/api/streaming/auth/publish;
            
            # Notify on events
            on_publish_done http://localhost:5000/api/streaming/notify/publish_done;
            on_play http://localhost:5000/api/streaming/notify/play;
            on_play_done http://localhost:5000/api/streaming/notify/play_done;
        }
        
        # HLS application (output from transcoding)
        application hls {
            live on;
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3s;
            hls_playlist_length 60s;
            
            # HLS variants
            hls_variant _1080p BANDWIDTH=5000000;
            hls_variant _720p BANDWIDTH=2800000;
            hls_variant _480p BANDWIDTH=1400000;
        }
    }
}

# HTTP configuration for HLS delivery
http {
    sendfile off;
    tcp_nopush on;
    directio 512;
    default_type application/octet-stream;
    
    server {
        listen 8080;
        
        # CORS headers for HLS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length' always;
        
        # HLS stream delivery
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            
            root /tmp;
            
            # Token-based authentication
            # Validate token from query parameter
            if ($arg_token = "") {
                return 403;
            }
            
            # Cache control
            add_header Cache-Control no-cache;
            
            # CORS
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
        
        # RTMP statistics
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        
        location /stat.xsl {
            root /usr/local/nginx/html;
        }
        
        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
