version: "3.8"

services:
  nginx-rtmp:
    image: tiangolo/nginx-rtmp
    container_name: ppv-streaming-nginx
    ports:
      - "1935:1935" # RTMP
      - "8080:8080" # HLS HTTP
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./recordings:/var/rec
      - hls-data:/tmp/hls
    restart: unless-stopped
    networks:
      - streaming-network
    environment:
      - TZ=America/New_York

  redis:
    image: redis:7-alpine
    container_name: ppv-streaming-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - streaming-network
    command: redis-server --appendonly yes

volumes:
  hls-data:
  redis-data:

networks:
  streaming-network:
    driver: bridge
