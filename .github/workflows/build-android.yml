name: Build Android APK

on:
  push:
    branches:
      - claude/setup-app-no-expo-d72Ul
      - main
    paths:
      - 'mobile/**'
  workflow_dispatch:   # Permite lanzarlo manualmente desde GitHub

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Código fuente
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      # 3. Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 4. Android SDK (viene pre-instalado en ubuntu-latest)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Instalar dependencias JS
      - name: Install JS dependencies
        working-directory: mobile
        run: npm ci

      # 6. Cache de Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 7. Permisos al wrapper
      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      # 8. Compilar APK debug
      - name: Build Debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # 9. Subir APK como artefacto descargable
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArenaFightPass-debug-${{ github.run_number }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 10. Mostrar info del APK
      - name: APK info
        run: |
          APK=mobile/android/app/build/outputs/apk/debug/app-debug.apk
          echo "✅ APK generado:"
          ls -lh $APK
          echo "SHA256: $(sha256sum $APK)"
